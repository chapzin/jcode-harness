<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
  <title id="title">jcode-harness engineering loop</title>
  <desc id="desc">A loop showing user request, init swarm, skills router, agent runtime, LLM wiki memory, verification gates, and durable handoff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .title{font:700 34px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#f8fafc}
      .subtitle{font:500 16px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .boxTitle{font:700 18px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#ffffff}
      .boxText{font:500 13px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#e2e8f0}
      .small{font:600 12px ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;fill:#cbd5e1}
      .node{rx:20;filter:url(#shadow)}
      .line{stroke:#94a3b8;stroke-width:3;fill:none;marker-end:url(#arrow);opacity:.9}
      .soft{fill:#1e293b;stroke:#334155;stroke-width:1.5}
    </style>
  </defs>

  <rect width="1180" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="90" r="150" fill="#1d4ed8" opacity="0.16"/>
  <circle cx="120" cy="540" r="190" fill="#059669" opacity="0.12"/>

  <text x="60" y="62" class="title">jcode-harness engineering loop</text>
  <text x="60" y="92" class="subtitle">Jcode runtime + embedded Karpathy-style skills + local LLM wiki memory + deterministic gates</text>

  <rect x="55" y="138" width="210" height="112" class="node" fill="url(#blue)"/>
  <text x="80" y="176" class="boxTitle">1. User request</text>
  <text x="80" y="202" class="boxText">Goal, constraints, cwd,</text>
  <text x="80" y="222" class="boxText">provider and safety policy</text>

  <rect x="335" y="138" width="220" height="112" class="node" fill="url(#purple)"/>
  <text x="360" y="176" class="boxTitle">2. /init swarm</text>
  <text x="360" y="202" class="boxText">Architecture, QA, docs,</text>
  <text x="360" y="222" class="boxText">tooling/security barrier</text>

  <rect x="625" y="138" width="220" height="112" class="node" fill="url(#green)"/>
  <text x="650" y="176" class="boxTitle">3. Skill router</text>
  <text x="650" y="202" class="boxText">karpathy-guidelines,</text>
  <text x="650" y="222" class="boxText">clean-code, optimization</text>

  <rect x="915" y="138" width="210" height="112" class="node" fill="url(#amber)"/>
  <text x="940" y="176" class="boxTitle">4. Agent runtime</text>
  <text x="940" y="202" class="boxText">Tools, provider, session,</text>
  <text x="940" y="222" class="boxText">swarm and side panel</text>

  <path class="line" d="M265 194 H325"/>
  <path class="line" d="M555 194 H615"/>
  <path class="line" d="M845 194 H905"/>

  <rect x="95" y="355" width="260" height="126" class="node" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="120" y="393" class="boxTitle">LLM wiki memory</text>
  <text x="120" y="419" class="boxText">Prior decisions, transcripts,</text>
  <text x="120" y="439" class="boxText">provenance and handoff context</text>
  <text x="120" y="459" class="small">Never sync secrets</text>

  <rect x="460" y="355" width="260" height="126" class="node" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="485" y="393" class="boxTitle">Verification gates</text>
  <text x="485" y="419" class="boxText">fmt, check, unit/e2e tests,</text>
  <text x="485" y="439" class="boxText">JSON contracts, clean-code</text>
  <text x="485" y="459" class="small">Done requires evidence</text>

  <rect x="825" y="355" width="260" height="126" class="node" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="850" y="393" class="boxTitle">Durable artifacts</text>
  <text x="850" y="419" class="boxText">.jcode plans, reports, status,</text>
  <text x="850" y="439" class="boxText">skills, docs and release gates</text>
  <text x="850" y="459" class="small">Future agents resume safely</text>

  <path class="line" d="M1020 250 C1020 305 955 315 955 345"/>
  <path class="line" d="M915 420 H730"/>
  <path class="line" d="M460 420 H365"/>
  <path class="line" d="M225 355 C225 305 735 305 735 260"/>

  <rect x="315" y="525" width="550" height="48" rx="24" class="soft"/>
  <text x="350" y="555" class="subtitle">Outcome: auditable, local-first agent work with memory, discipline and objective completion gates</text>
</svg>
